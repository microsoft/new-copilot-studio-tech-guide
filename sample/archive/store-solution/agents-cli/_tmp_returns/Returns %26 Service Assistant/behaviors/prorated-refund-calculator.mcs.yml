  <!-- bic:source=upload -->
  # Prorated Refund Calculator (BlastPass)

  This skill computes the **exact** refund owed when a customer cancels their
  BlastPass membership. The math must be exact and consistent, so you **generate
  and run a short Python snippet** to do the arithmetic — never compute the refund
  in your head or with mental math.

  ## When to use

  Use this skill in a BlastPass cancellation, once you have:

  1. The **Store Policy Agent** has confirmed the member's tier and that a
     **prorated refund** applies (it reads the tier policy documents).
  2. The **Membership MCP** (`get_membership`) has returned the membership record
     for the customer's `mega-blast-customer-id`, including `annual_price`,
     `months_remaining`, `cancellation_fee`, `nonrefundable_credit`, and
     `within_cooling_off`.

  Do **not** invent any of these numbers. They come from the Membership MCP and the
  Store Policy Agent.

  ## The refund rules (single source of truth)

  These rules mirror the BlastPass policy documents the Store Policy Agent holds:

  1. **Cooling-off (full refund).** If `within_cooling_off` is true (membership
     activated 14 days ago or less **and** under 2 hours streamed), refund the full
     `annual_price`. No fee, no proration.
  2. **Prorated cancellation (the usual case).** Otherwise refund the value of the
     whole unused months left on the 12-month term, then subtract the tier
     cancellation fee:
     - `monthly_value = annual_price / 12`
     - `prorated = round(months_remaining * monthly_value, 2)`
     - `refund = prorated - cancellation_fee`
  3. **MEGA welcome credit.** Subtract `nonrefundable_credit` (only the Plus Extra
     MEGA!!! tier has one — $20). For other tiers it is 0.
  4. The refund is **never negative**. If fees exceed the prorated value, the refund
     is `$0.00`.

  ## Workflow

  ### 1. Collect the inputs

  From the Membership MCP `get_membership` result, take:
  `annual_price`, `months_remaining`, `cancellation_fee`, `nonrefundable_credit`,
  and `within_cooling_off`. Confirm the tier matches what the Store Policy Agent
  quoted.

  ### 2. Generate and run this Python

  Write and execute a snippet like the following, substituting the real values:

  ```python
  def money(v):
      cents = int(v * 100 + (0.5 if v >= 0 else -0.5))
      return cents / 100.0

  # --- inputs from the Membership MCP ---
  annual_price = 129.99          # get_membership.annual_price
  months_remaining = 8           # get_membership.months_remaining
  cancellation_fee = 10.00       # get_membership.cancellation_fee
  nonrefundable_credit = 0.00    # get_membership.nonrefundable_credit
  within_cooling_off = False     # get_membership.within_cooling_off

  lines = []
  if within_cooling_off:
      refund = money(annual_price)
      lines.append(f"Within 14-day cooling-off and under 2h used -> full refund of ${annual_price:.2f}")
  else:
      monthly = annual_price / 12
      prorated = money(months_remaining * monthly)
      lines.append(f"Monthly value: ${annual_price:.2f} / 12 = ${monthly:.4f}")
      lines.append(f"Prorated: {months_remaining} unused months x ${monthly:.4f} = ${prorated:.2f}")
      refund = prorated
      if cancellation_fee > 0:
          lines.append(f"Cancellation fee: -${cancellation_fee:.2f}")
          refund = money(refund - cancellation_fee)
      if nonrefundable_credit > 0:
          lines.append(f"Non-refundable MEGA welcome credit: -${nonrefundable_credit:.2f}")
          refund = money(refund - nonrefundable_credit)
      refund = max(refund, 0.0)

  print("\n".join(lines))
  print(f"REFUND DUE: ${refund:.2f}")
  ```

  ### 3. Report the result

  - State the **refund due** clearly (e.g. "The customer is owed **$76.66**").
  - Show the breakdown lines so the associate can verify how it was derived.
  - Offer to cancel the membership via the Membership MCP (`cancel_membership`)
    using the agreed refund amount, and to generate a return/RMA slip.

  ## Worked example

  BlastPass Plus Extra, `annual_price = 129.99`, `months_remaining = 8`,
  `cancellation_fee = 10`, `nonrefundable_credit = 0`, not in cooling-off:

  - Monthly value = 129.99 / 12 = $10.8325
  - Prorated = 8 x $10.8325 = $86.66
  - Minus $10 fee = **$76.66**

  ## Upgrade settlement (defective swap → higher model)

  Sometimes the membership cancellation happens alongside a **console upgrade** — the
  customer's defective unit is credited under warranty and they put the value toward a
  pricier model, applying the membership refund as store credit. The **same exact-Python
  rule** applies: never compute the net in your head.

  ### When to use

  After (a) the Store Policy Agent confirms the defective unit is credited at its
  purchase price with no restocking fee, (b) the Warehouse MCP returns the upgrade
  model's price, and (c) the prorated membership refund above is known.

  ### Generate and run this Python

  ```python
  def money(v):
      cents = int(v * 100 + (0.5 if v >= 0 else -0.5))
      return cents / 100.0

  # --- inputs ---
  defective_credit = 399.99      # warranty credit for the defective unit (its purchase price)
  upgrade_price    = 499.99      # Warehouse MCP price of the new (MEGA) model
  membership_credit = 76.66      # prorated refund from the section above, applied as store credit

  upgrade_difference = money(upgrade_price - defective_credit)
  net = money(upgrade_difference - membership_credit)

  print(f"Defective unit warranty credit: ${defective_credit:.2f}")
  print(f"Upgrade model price: ${upgrade_price:.2f}")
  print(f"Upgrade difference: ${upgrade_price:.2f} - ${defective_credit:.2f} = ${upgrade_difference:.2f}")
  print(f"BlastPass refund applied as store credit: -${membership_credit:.2f}")
  if net >= 0:
      print(f"NET DUE FROM CUSTOMER: ${net:.2f}")
  else:
      print(f"REFUND TO CUSTOMER: ${-net:.2f}")
  ```

  ### Worked example (eval scenario)

  Defective base console credited $399.99, MEGA edition $499.99, membership refund
  $76.66 applied as credit:

  - Upgrade difference = 499.99 − 399.99 = **$100.00**
  - Net = 100.00 − 76.66 = **$23.34 due from the customer**

  Hand the final numbers to the `slip-pdf-generator` skill to print the slip.

