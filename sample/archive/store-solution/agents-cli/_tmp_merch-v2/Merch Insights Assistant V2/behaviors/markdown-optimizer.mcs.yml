  ---
  <!-- bic:source=upload -->
  # Markdown Optimizer

  This skill decides **how much to mark down** each slow-moving product. The pricing
  **guardrails are NOT hardcoded here** — they come from the **Store Policy Agent** via
  `get_markdown_policy(markdown_type)` and are passed in as inputs. This keeps all policy in
  one place (the Policy Agent owns it).

  ## Inputs (gather these first)

  1. **Slow movers** (from `sales-analysis-chart`): the structured `slow_movers` JSON it prints —
     a list of `{sku, name, price, cost, weeks_of_cover, margin}`.
  2. **Guardrails** — call the **Store Policy Agent** · `get_markdown_policy("promo")` (or
     `"clearance"`). For a **promo** it returns `{max_discount_pct, margin_floor_pct,
     min_useful_promo_discount_pct, clearance_allowed, requires_manager_flag}` (e.g. `max 30`,
     `floor 15`, `min_useful 10`). **Pass ALL of these into the Python below — including the
     `min_useful_promo_discount_pct` threshold. Do not invent or hardcode any of them.**

  ## The rule

  For each item, under a **promo**:

  - **floor price** = `cost / (1 - margin_floor_pct/100)` — the lowest price that still keeps the
    required gross margin.
  - **floor-allowed discount %** = `(price - floor_price) / price * 100`.
  - **recommended discount %** = `min(max_discount_pct, floor_allowed_pct)`.
    - If `max_discount_pct` is the binding constraint → headline discount, healthy margin.
    - If the **floor** is binding → discount stops at the floor; the new margin equals the floor.
  - **Flag for clearance** when the floor-allowed discount is below the Policy Agent's
    `min_useful_promo_discount_pct` (e.g. 10%): the item can't be meaningfully promoted, so it
    should be **discontinued via clearance** (a different `markdown_type` requiring a manager flag).

  Under a **clearance** (`get_markdown_policy("clearance")` returns null cap/floor and
  `requires_manager_flag:true`): there is no margin floor, so do **not** compute a promo discount —
  record that each item needs a **manager flag** and propose a clear-out price separately (e.g. at
  or below cost). The promo math below only applies when `markdown_type == "promo"`.

  ## Generate and run this Python

  ```python
  import json

  def optimize(items, max_discount_pct, margin_floor_pct, min_useful_promo_discount_pct):
      out = []
      for m in items:
          price, cost = float(m["price"]), float(m["cost"])
          floor_price = cost / (1 - margin_floor_pct / 100.0)
          floor_allowed = (price - floor_price) / price * 100.0
          rec = min(max_discount_pct, max(0.0, floor_allowed))
          binding = "margin_floor" if floor_allowed < max_discount_pct else "max_discount"
          if binding == "margin_floor":
              new_price = round(floor_price + 0.005, 2)          # sit just at/above the floor
          else:
              new_price = round(price * (1 - rec / 100.0), 2)
          new_margin = (new_price - cost) / new_price * 100.0
          out.append({"sku": m["sku"], "name": m["name"], "price": round(price, 2),
                      "rec_discount_pct": round(rec, 1), "new_price": new_price,
                      "new_margin": round(new_margin, 1), "binding": binding,
                      "floor_allowed_pct": round(floor_allowed, 1),
                      "flag_clearance": floor_allowed < min_useful_promo_discount_pct})
      return out

  # --- inputs: paste the slow_movers JSON + the guardrails returned by the Policy Agent ---
  slow = [ {"sku": "...", "name": "...", "price": 0.0, "cost": 0.0} ]
  MAX_DISCOUNT_PCT = 30                 # from get_markdown_policy("promo").max_discount_pct
  MARGIN_FLOOR_PCT = 15                 # from get_markdown_policy("promo").margin_floor_pct
  MIN_USEFUL_PROMO_DISCOUNT_PCT = 10    # from get_markdown_policy("promo").min_useful_promo_discount_pct

  recs = optimize(slow, MAX_DISCOUNT_PCT, MARGIN_FLOOR_PCT, MIN_USEFUL_PROMO_DISCOUNT_PCT)
  for r in recs:
      tag = "  -> FLAG CLEARANCE" if r["flag_clearance"] else ""
      print(f'{r["name"][:26]:26} -{r["rec_discount_pct"]:4.1f}%  '
            f'${r["price"]:.2f} -> ${r["new_price"]:.2f}  margin {r["new_margin"]:.1f}%  '
            f'({r["binding"]}){tag}')

  # structured handoff for the PDF skill
  print("RECOMMENDATIONS_JSON=" + json.dumps(recs))

  # optional: chart the recommended promo discounts (exclude clearance flags)
  import matplotlib
  matplotlib.use("Agg")
  import matplotlib.pyplot as plt
  promo = [r for r in recs if not r["flag_clearance"]]
  if promo:
      fig, ax = plt.subplots(figsize=(7, 4))
      ax.bar([r["name"][:16] for r in promo], [r["rec_discount_pct"] for r in promo], color="#6b2fb5")
      ax.set_ylabel("Recommended discount %"); ax.set_title("Promo Markdowns")
      fig.tight_layout(); fig.savefig("markdowns.png", dpi=120); plt.close(fig)
      print("WROTE markdowns.png")
  ```

  ## Report

  - Present a table: product, current price, recommended discount %, new price, new margin,
    and whether the **margin floor** or the **max-discount cap** was binding.
  - Call out any item **flagged for clearance** (and that clearance is a separate decision
    requiring a manager flag, per `get_markdown_policy("clearance")`).
  - Hand the finalized promo set to **merch-report-pdf** for the shareable report.

  ## Notes

  - The guardrail numbers MUST come from the Store Policy Agent. If they are missing, fetch them
    before running — do not guess.
  - Round prices to cents. Keep the new margin at or above the floor (never below).
