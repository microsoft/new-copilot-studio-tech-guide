  <!-- bic:source=upload -->
  # BlastPass Card Reissue

  Use this when someone wants to replace a **lost, stolen, or damaged** BlastPass
  card. It is a card swap only — the membership stays active. Never use
  `cancel_membership` here.

  Follow these steps in order. Do not skip the identity check, and do not change
  anything until identity is verified.

  ## 1. Look up the membership

  Ask for the membership ID if you don't have it, then call **`get_membership`**
  with it. This is read-only — nothing changes yet. Keep the details you get back
  (name, console serial, tier, dates) to yourself for now.

  ## 2. Verify identity (two factors)

  Before deactivating any card, confirm it's really the account holder. Ask for
  **two things**:

  1. The **name** on the membership, and
  2. The **last 4 digits of the console serial** (printed on the bottom of the
     BlastBox Omega).

  **Do not reveal** the name, serial, or any on-file detail while asking — make
  them tell you. Continue **only if both match** the record (`member_name`, and the
  last 4 of `console_serial`). If either one doesn't match, politely stop and do
  **not** reissue.

  ## 3. Reissue the card

  Once both factors match, call **`reissue_card(membership_id, reason)`** (reason =
  lost / stolen / damaged). This deactivates the old card, mints a **new serial**,
  keeps the membership active, and queues the physical card for standard mail
  (~7 days).

  ## 4. Hand over the digital card

  Run the **`membership-card-png`** skill with the member's details and the
  **new** serial from `reissue_card` to generate `blastpass_card.png`. Never put
  the old (now-deactivated) serial on the card.

  ## 5. Confirm

  In one warm, short message: the new card is ready (the PNG), the new serial, that
  the old card is now deactivated, the mail ETA, and the reissue confirmation
  number. Note their membership, tier, and points are unchanged.
